{% extends "shop/base.html" %}
{% block title %}Manage Sets - Tabletopia{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 style="font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--tt-dark-green);">Sets</h1>
    <a href="{% url 'admin-set-add' %}" class="btn" style="background:var(--tt-dark-green);color:var(--tt-cream);border-radius:1rem;font-family:'Nunito',sans-serif;font-weight:700;">+ Add Set</a>
</div>

<div class="bg-white rounded-3 shadow-sm overflow-hidden">
    <table class="table mb-0">
        <thead style="background:var(--tt-light-green);">
            <tr>
                <th style="font-family:'Nunito',sans-serif;">Name</th>
                <th style="font-family:'Nunito',sans-serif;">Code</th>
                <th style="font-family:'Nunito',sans-serif;">Slug</th>
                <th style="font-family:'Nunito',sans-serif;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for set in sets %}
            <tr>
                <td style="font-family:'Nunito',sans-serif;font-weight:700;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ set.name }}</td>
                <td style="font-family:'Nunito',sans-serif;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ set.code }}</td>
                <td style="font-family:'Nunito',sans-serif;vertical-align:middle;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ set.slug }}</td>
                <td style="vertical-align:middle;">
                    <a href="{% url 'admin-set-edit' set.id %}" class="btn btn-sm me-1" style="background:var(--tt-mid-green);color:white;border-radius:0.75rem;font-family:'Nunito',sans-serif;font-weight:700;">Edit</a>
                    <a href="{% url 'admin-set-delete' set.id %}" class="btn btn-sm" style="background:#dc2626;color:white;border-radius:0.75rem;font-family:'Nunito',sans-serif;font-weight:700;">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted py-4" style="font-family:'Nunito',sans-serif;">No sets yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="mt-3">
    <a href="{% url 'admin-dashboard' %}" style="font-family:'Nunito',sans-serif;font-weight:700;color:var(--tt-mid-green);text-decoration:none;">← Back to Admin</a>
</div>
{% endblock %}
